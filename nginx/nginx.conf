# =============================================================================
# Smart Attendance System — nginx.conf
# =============================================================================
# Full production configuration for the nginx container that:
#   • Serves the Vite/React SPA from /usr/share/nginx/html
#   • Reverse-proxies REST calls  (/api/)  →  backend:8000
#   • Reverse-proxies WebSocket   (/ws/)   →  backend:8000  (with upgrade)
#   • Applies gzip compression, security headers, and rate limiting
#
# Drop this file at:  nginx/nginx.conf
# The frontend Dockerfile should COPY it to /etc/nginx/nginx.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Worker / process model
# ---------------------------------------------------------------------------
worker_processes      auto;          # one worker per CPU core
worker_rlimit_nofile  65535;         # max open file descriptors per worker
pid                   /tmp/nginx.pid;  # writable by non-root

error_log  /var/log/nginx/error.log  warn;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;        # Linux-optimal event model
}

# ---------------------------------------------------------------------------
# HTTP context
# ---------------------------------------------------------------------------
http {

    # ── MIME types ────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;   # batch headers + first data segment
    tcp_nodelay         on;   # disable Nagle for keep-alive / WS connections
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;  # hide nginx version from responses

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;    # don't bother compressing tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Client body / buffer sizes ────────────────────────────────────────
    # Frames sent over the WebSocket path bypass these limits (binary stream),
    # but REST file uploads (if any) are bounded here.
    client_max_body_size    20m;
    client_body_buffer_size 128k;

    # ── Rate limiting zones ───────────────────────────────────────────────
    # auth_limit  : tight limit for login / token endpoints
    # api_limit   : general API rate limit per client IP
    # ws_limit    : one WS connection per IP (recognition endpoint)
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=api_limit:20m   rate=60r/m;
    limit_conn_zone $binary_remote_addr  zone=ws_limit:10m;

    # ── Upstream: FastAPI / Uvicorn ───────────────────────────────────────
    upstream backend_upstream {
        server backend:8000;

        # Connection pooling: keep up to 32 idle connections alive so
        # nginx doesn't open a new TCP connection for every request.
        keepalive 32;
    }

    # ── Security headers map (applied to all proxied + static responses) ──
    # Declared here once; referenced via `include` in the server block.
    map $sent_http_content_type $x_frame_options {
        default  "SAMEORIGIN";
    }

    # =========================================================================
    # Server block
    # =========================================================================
    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security headers ──────────────────────────────────────────────
        add_header  X-Frame-Options           "SAMEORIGIN"               always;
        add_header  X-Content-Type-Options    "nosniff"                  always;
        add_header  X-XSS-Protection          "1; mode=block"            always;
        add_header  Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header  Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        # NOTE: Camera access is required for the recognition kiosk page.
        # Override the Permissions-Policy header on that specific location
        # if you serve it from a dedicated path:
        #   add_header Permissions-Policy "camera=(self)" always;

        # Strict-Transport-Security is intentionally omitted here so that
        # HTTP-only deployments are not accidentally locked to HTTPS.
        # Add it in the HTTPS server block when TLS is terminated here.

        # Content-Security-Policy — tighten per your actual asset sources.
        add_header  Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: blob:; "
            "font-src 'self'; "
            "connect-src 'self' ws: wss:; "
            "frame-ancestors 'none';"
            always;

        # ── Static assets (Vite build output) ────────────────────────────
        # Vite injects a content hash into every JS/CSS filename, so these
        # assets are safe to cache for a very long time.
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif|avif)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;           # reduce log noise for asset hits
            try_files  $uri =404;
        }

        # index.html must never be cached so the browser always fetches the
        # latest shell, even after a new deployment.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files  $uri =404;
        }

        # ── REST API reverse proxy  /api/ → backend:8000 ─────────────────
        location /api/ {
            # General API rate limit: 60 req/min with a burst of 20
            limit_req  zone=api_limit  burst=20  nodelay;

            # Tighter rate limit on authentication endpoints
            location ~ ^/api/v1/auth/(login|token|refresh) {
                limit_req  zone=auth_limit  burst=5  nodelay;

                proxy_pass         http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header   Connection        "";   # enable keep-alive pooling
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_read_timeout  30s;
                proxy_connect_timeout 5s;
                proxy_send_timeout  30s;
            }

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # keep-alive pooling
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    60s;
            proxy_connect_timeout  5s;
            proxy_send_timeout    60s;

            # Pass error responses from FastAPI through to the client as-is
            proxy_intercept_errors off;
        }

        # ── WebSocket proxy  /ws/ → backend:8000 ─────────────────────────
        # The recognition endpoint streams JPEG frames from the browser and
        # receives JSON events.  Timeouts are set to 1 h to survive long
        # recognition sessions without the proxy dropping the connection.
        location /ws/ {
            # Limit to a reasonable number of concurrent WS connections per IP.
            # Adjust upward if a single device hosts multiple kiosks.
            limit_conn ws_limit 10;

            proxy_pass              http://backend_upstream;
            proxy_http_version      1.1;

            # The two headers that trigger the HTTP → WebSocket upgrade:
            proxy_set_header        Upgrade     $http_upgrade;
            proxy_set_header        Connection  "Upgrade";

            proxy_set_header        Host                $host;
            proxy_set_header        X-Real-IP           $remote_addr;
            proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto   $scheme;

            # Long timeouts: the server sends a keepalive ping every 15 s
            # (KEEPALIVE_INTERVAL_S in recognition_ws.py), so 3600 s gives
            # ~240 idle pings before the proxy would drop the connection.
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            proxy_connect_timeout   5s;

            # Disable response buffering — frames must reach the client in
            # real time, not be held in an nginx buffer.
            proxy_buffering         off;
            proxy_cache             off;
        }

        # ── Health / readiness check (for load-balancers & Compose) ──────
        location = /health {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;

            access_log off;   # avoid flooding access log with probe traffic
        }

        # ── SPA fallback ─────────────────────────────────────────────────
        # Any path not matched above is a React Router client-side route.
        # Return index.html so React can render the correct view.
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must not be stale after a deployment
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Error pages ───────────────────────────────────────────────────
        error_page  404              /index.html;   # React Router handles 404
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # =========================================================================
    # HTTPS server block (uncomment when TLS is terminated at nginx)
    # =========================================================================
    # Prerequisites:
    #   1. Mount your certificate + key into the container:
    #        volumes:
    #          - /etc/letsencrypt/live/attendance.example.com:/etc/nginx/certs:ro
    #   2. Update the docker-compose.yml frontend ports to "443:443" and "80:80"
    # =========================================================================
    # server {
    #     listen       443 ssl;
    #     listen  [::]:443 ssl;
    #     http2        on;
    #     server_name  attendance.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     # Modern TLS only (nginx ≥1.25.1 supports TLSv1.3 natively)
    #     ssl_protocols             TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #     ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #     ssl_session_cache         shared:SSL:10m;
    #     ssl_session_timeout       1d;
    #     ssl_session_tickets       off;
    #     ssl_stapling              on;
    #     ssl_stapling_verify       on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... (paste the same location blocks from the HTTP server above)
    # }
    #
    # # Redirect all plain-HTTP traffic to HTTPS
    # server {
    #     listen       80;
    #     listen  [::]:80;
    #     server_name  attendance.example.com;
    #     return 301   https://$host$request_uri;
    # }
}
