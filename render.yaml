# render.yaml — Render Blueprint for the Smart Attendance backend
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy this by connecting the GitHub repo to Render and selecting
# "Blueprint" — Render will read this file automatically.
# Alternatively, configure the same settings manually in the dashboard.

services:
  - type: web
    name: smart-attendance-backend
    runtime: python
    # Root directory of the backend within the monorepo
    rootDir: backend
    # Python version — matches backend/runtime.txt
    pythonVersion: "3.12"

    # ── Build ──────────────────────────────────────────────────────────────
    # Install CPU-only PyTorch first (avoids the 2 GB CUDA wheel).
    # Then install the rest of requirements.txt.
    # Finally, pre-download FaceNet weights so they are baked into the
    # build image and never downloaded at cold-start (avoids timeout/500).
    buildCommand: |
      pip install --upgrade pip &&
      pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt &&
      python -c "from facenet_pytorch import InceptionResnetV1; InceptionResnetV1(pretrained='vggface2'); print('FaceNet weights cached.')"

    # ── Start ──────────────────────────────────────────────────────────────
    # Use $PORT — Render assigns the port dynamically; hardcoding 8000 breaks deploys.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --forwarded-allow-ips '*'

    # ── Health check ───────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment variables ──────────────────────────────────────────────
    # Secret values (DATABASE_URL, JWT_SECRET_KEY, etc.) must be set in the
    # Render dashboard under Environment → Secret Files / Env Vars.
    # Only non-secret defaults are listed here.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: FORCE_CPU_INFERENCE
        value: "1"
      # Set DATABASE_URL in the Render dashboard — do NOT commit it here.
      # Format: postgresql+psycopg://user:pass@host:port/dbname
      # (config.py auto-converts postgres:// and postgresql:// if you paste
      #  Render's connection string directly)
      - key: DATABASE_URL
        sync: false        # marks it as a secret — Render asks for value in dashboard
      - key: JWT_SECRET_KEY
        sync: false
      # Your deployed Vercel frontend URL — enables CORS for it
      - key: BACKEND_CORS_ORIGINS
        value: https://smart-attendance-face-recogonition.vercel.app
